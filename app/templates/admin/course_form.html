{% extends "shared/base.html" %}
{% block title %}New Course{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:600px;">
  <div class="mb-4">
    <a href="{{ url_for('admin.courses') }}" class="text-accent text-decoration-none small">
      <i class="bi bi-arrow-left me-1"></i>Back to Courses
    </a>
    <h4 class="fw-bold mt-2">New Course</h4>
  </div>
  <div class="synapse-card">
    <div class="synapse-card-body">
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}">
        <div class="mb-3">
          <label class="form-label">Course Title *</label>
          <input name="title" class="form-control synapse-input" required placeholder="e.g. Introduction to Physics">
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea name="description" class="form-control synapse-input" rows="3" placeholder="Brief description of the course…"></textarea>
        </div>
        <div class="row g-3 mb-4">
          <div class="col">
            <label class="form-label">Category</label>
            <input name="category" class="form-control synapse-input" placeholder="e.g. Science, Mathematics">
          </div>
          <div class="col">
            <label class="form-label">Difficulty</label>
            <select name="difficulty" class="form-select synapse-input">
              <option value="beginner">Beginner</option>
              <option value="intermediate">Intermediate</option>
              <option value="advanced">Advanced</option>
            </select>
          </div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary synapse-btn flex-grow-1">
            <i class="bi bi-check-circle me-2"></i>Create Course
          </button>
          <a href="{{ url_for('admin.courses') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
